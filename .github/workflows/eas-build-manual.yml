name: EAS Build Manual

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plataforma para build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Perfil de build'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependências
        working-directory: frontend
        run: npm install

      - name: Build app
        working-directory: frontend
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
