name: EAS Update e Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Publicar EAS Update
        working-directory: frontend
        run: eas update --auto --non-interactive

  build:
    name: EAS Build Android
    runs-on: ubuntu-latest
    needs: update
    if: contains(github.event.head_commit.message, '[build]') || contains(github.event.head_commit.message, '[android]')
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build Android Preview
        working-directory: frontend
        run: eas build --platform android --profile preview --non-interactive --no-wait
